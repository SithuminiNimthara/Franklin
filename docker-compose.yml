version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5002:5002"
    env_file:
      - ./Backend/.env
    restart: unless-stopped
    depends_on:
      - ai_service

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        # Pass required build-time arguments. Adjust values for staging/prod as needed.
        VITE_API_BASE_URL: http://localhost:5002
        VITE_AI_SERVICE_URL: http://localhost:8000
        VITE_CLERK_PUBLISHABLE_KEY: pk_test_cHVtcGVkLWNvd2JpcmQtNzQuY2xlcmsuYWNjb3VudHMuZGV2JA
        VITE_GOOGLE_MAPS_API_KEY: AIzaSyDpwy79IM6EjuRUy0-lpf3wrkkfRvjuGsk

    ports:
      - "5173:80"
    restart: unless-stopped
    depends_on:
      - backend

  ai_service:
    build:
      context: ./Models
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    # Use larger shm_size if Ultralytics or TensorFlow complain about shared memory
    shm_size: '2gb'
