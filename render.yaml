services:
  # 1) Frontend (Static Site)
  - type: web
    name: franklin-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # SET MANUALLY AFTER DEPLOY
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_MODEL_UNIFIED_URL
        sync: false
      - key: VITE_MODEL_DISEASE_URL
        sync: false
      - key: VITE_MODEL_SHORELINE_URL
        sync: false
      - key: VITE_MODEL_HATCHERY_URL
        sync: false

  # 2) Backend (Node API)
  - type: web
    name: franklin-backend
    runtime: node
    plan: starter
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: MONGO_URI
        sync: false

      - key: STREAMING_ENABLED
        value: "false"

      # PUBLIC URLS – SET AFTER DEPLOY
      - key: FRONTEND_URL
        sync: false
      - key: PY_UNIFIED_URL
        sync: false
      - key: PY_DISEASE_URL
        sync: false
      - key: PY_SHORELINE_URL
        sync: false
      - key: PY_HATCHERY_URL
        sync: false

      - key: CLERK_SECRET_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # 3) Unified AI (FastAPI)
  - type: web
    name: model-unified
    runtime: python
    plan: starter
    rootDir: Models/Unified_Backend
    buildCommand: pip install fastapi uvicorn python-multipart requests opencv-python-headless numpy ultralytics
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

  # 4) Disease Detection (FastAPI)
  - type: web
    name: model-disease
    runtime: python
    plan: starter
    rootDir: Models/Disease_Detection
    buildCommand: pip install fastapi uvicorn python-multipart opencv-python-headless numpy tensorflow keras pillow
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

  # 5) Shoreline Segmentation (FastAPI)
  - type: web
    name: model-shoreline
    runtime: python
    plan: starter
    rootDir: Models/Shoreline_Segmentation_Backend
    buildCommand: pip install fastapi uvicorn python-multipart opencv-python-headless numpy ultralytics python-dotenv
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

  # 6) Hatchery Detection (Flask)
  - type: web
    name: model-hatchery
    runtime: python
    plan: starter
    rootDir: Models/Hatchery_Detection
    buildCommand: pip install flask flask-cors requests opencv-python-headless numpy ultralytics
    startCommand: python ai_server.py
