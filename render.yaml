services:
  # 1) Frontend (Static Site)
  - type: web
    name: franklin-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # SET MANUALLY AFTER DEPLOY
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_MODEL_UNIFIED_URL
        sync: false
      - key: VITE_MODEL_DISEASE_URL
        sync: false
      - key: VITE_MODEL_SHORELINE_URL
        sync: false
      - key: VITE_MODEL_HATCHERY_URL
        sync: false

  # 2) Backend (Node API)
  - type: web
    name: franklin-backend
    runtime: node
    plan: free # Explicitly requested free tier
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: MONGO_URI
        sync: false

      - key: STREAMING_ENABLED
        value: "false"

      # PUBLIC URLS – SET AFTER DEPLOY
      - key: FRONTEND_URL
        sync: false
      - key: PY_UNIFIED_URL
        sync: false
      - key: PY_DISEASE_URL
        sync: false
      - key: PY_SHORELINE_URL
        sync: false
      - key: PY_HATCHERY_URL
        sync: false

      - key: CLERK_SECRET_KEY
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # 3) Franklin AI Service (Merged Python)
  - type: web
    name: franklin-ai
    runtime: python
    plan: free # Explicitly requested free tier
    rootDir: Models/AI_Service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: NODE_BACKEND_URL
        sync: false
      - key: AI_SERVICE_URL
        sync: false
