name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: docker compose build

      - name: Show Docker images
        run: docker images

      - name: Start containers
        run: docker compose up -d

      - name: Show running containers
        run: docker ps -a

      - name: Show container logs
        run: docker compose logs --no-color

      - name: Check backend health
        run: curl -f http://localhost:5002/health || exit 1

      - name: Create deployment report
        run: |
          echo "Deployment Report" > deployment-report.txt
          echo "Repository: Franklin" >> deployment-report.txt
          echo "Branch: $GITHUB_REF_NAME" >> deployment-report.txt
          echo "Commit: $GITHUB_SHA" >> deployment-report.txt
          echo "" >> deployment-report.txt
          echo "=== Docker Images ===" >> deployment-report.txt
          docker images >> deployment-report.txt
          echo "" >> deployment-report.txt
          echo "=== Docker Containers ===" >> deployment-report.txt
          docker ps -a >> deployment-report.txt
          echo "" >> deployment-report.txt
          echo "=== Docker Compose Logs ===" >> deployment-report.txt
          docker compose logs --no-color >> deployment-report.txt

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment-report.txt

      - name: Stop containers
        if: always()
        run: docker compose down -v